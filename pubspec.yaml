name: word_search_game
description: Word Masters — neon word puzzle game with classic search and word guess modes.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  confetti: ^0.8.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0
  firebase_analytics: ^12.4.3
  google_sign_in: ^7.2.0
  image_picker: ^1.2.2
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#050810"
  adaptive_icon_foreground: assets/branding/app_icon.png
  min_sdk_android: 21
  web:
    generate: true
    image_path: assets/branding/app_icon.png
    background_color: "#050810"
    theme_color: "#7B5CFF"

flutter:
  uses-material-design: true
  assets:
    - assets/branding/app_icon.png
